<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" width="240" height="72">
  <!-- Shadow for depth -->
  <rect x="8" y="8" width="224" height="56" rx="28" ry="28" fill="rgba(0,0,0,0.18)"/>
  <!-- Red rounded background pill – centered: x=4, width=232 → center at 120 -->
  <rect x="4" y="4" width="232" height="64" rx="32" ry="32" fill="#C1272D"/>
  <!-- Subtle inner highlight -->
  <rect x="4" y="4" width="232" height="32" rx="32" ry="32" fill="rgba(255,255,255,0.08)"/>
  <!-- kredenc text in white – clean modern wordmark -->
  <text x="120" y="43" font-family="'Trebuchet MS', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">kredenc</text>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" width="220" height="70">
  <!-- Red rounded pill background -->
  <rect x="0" y="0" width="220" height="70" rx="35" ry="35" fill="#C1272D"/>
  <!-- KREDENC main text -->
  <text x="110" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">KREDENC</text>
  <!-- KUCHYNE subtitle -->
  <text x="110" y="56" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFD0D0" text-anchor="middle" letter-spacing="6">KUCHYNE</text>
</svg>
